<mat-card>
  <mat-card-title>Historial de transacciones</mat-card-title>

  <table mat-table [dataSource]="transactions()" class="mat-elevation-z2">

    <!-- Fondo -->
    <ng-container matColumnDef="fundName">
      <th mat-header-cell *matHeaderCellDef> Fondo </th>
      <td mat-cell *matCellDef="let tx"> {{ tx.fundName }} </td>
    </ng-container>

    <!-- Tipo -->
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef> Tipo </th>
      <td mat-cell *matCellDef="let tx">
        <mat-chip [color]="getTypeColor(tx.type)" selected>
          {{ getTypeLabel(tx.type) }}
        </mat-chip>
      </td>
    </ng-container>

    <!-- Monto -->
    <ng-container matColumnDef="amount">
      <th mat-header-cell *matHeaderCellDef> Monto </th>
      <td mat-cell *matCellDef="let tx">
        {{ tx.amount | currency }}
      </td>
    </ng-container>

    <!-- Fecha -->
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef> Fecha </th>
      <td mat-cell *matCellDef="let tx">
        {{ tx.date | date:'short' }}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <!-- Estado vacío -->
  <div *ngIf="transactions().length === 0" class="empty-state">
    No hay transacciones registradas.
  </div>
</mat-card>
